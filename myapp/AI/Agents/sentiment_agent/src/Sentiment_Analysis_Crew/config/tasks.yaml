load_reviews:
  description: >
    Based on the inputs {reviews_file} and {file_type}, choose the correct loader tool
    to extract all customer reviews from the file. Supported file types are:
    .txt, .csv, .json, .xlsx, .pdf, and .docx.

    You must:
    - Validate the file exists.
    - Match the {file_type} to the correct loader.
    - Return all reviews in plain text format.

    Your output will be passed to the sentiment_emotion_analyzer agent.
  expected_output: >
    A single plain text string containing all reviews extracted from the file.
    This output will be used for further sentiment and emotion analysis.
  agent: fileloader

analyze_sentiment_and_emotion:
  description: >
    Perform sentiment and emotion analysis on the reviews provided by the fileloader.

    Step 1: Calculate the percentage of positive and negative reviews.
    Step 2: Identify the 1 to 3 most dominant emotions (e.g., joy, anger, sadness).

    You must return real results — never use placeholders.

    Format:

    Based on the analysis of the customer reviews:

    1. **Sentiment Analysis:**
       * Percentage of Positive Reviews: XX.X%
       * Percentage of Negative Reviews: XX.X%

    2. **Dominant Emotions:**
       * Emotion 1: <emotion>
       * Emotion 2: <emotion>
       * Emotion 3: <emotion> (optional)
  expected_output: >
    A structured summary that includes percentages and dominant emotions extracted from the review text.
    Final values must be based on actual content, not placeholders.
  agent: sentiment_emotion_analyzer
  context: [load_reviews]
