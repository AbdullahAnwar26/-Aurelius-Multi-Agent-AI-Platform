services:
  - type: web
    name: mars-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn myproject.wsgi --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: neon-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: mars-backend-7.onrender.com
databases:
  - name: neon-db
